<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIFootVerse</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>⚽ AIFootVerse</h1>
    <p>Watch FIFA World Cup Highlights & Live Scores</p>
</header>

<section class="hero">
    <h2>FIFA World Cup 2026</h2>
    <button id="watchBtn">Watch Now</button>
</section>

<section class="matches">
    <div class="card">
        <h3>Argentina vs Brazil</h3>
        <p>Today - 8:00 PM</p>
    </div>

    <div class="card">
        <h3>France vs Germany</h3>
        <p>Tomorrow - 7:00 PM</p>
    </div>

    <div class="card">
        <h3>England vs Spain</h3>
        <p>Friday - 9:00 PM</p>
    </div>
</section>

<section class="video">
    <iframe
        width="100%"
        height="400"
        src="https://www.youtube.com/embed/dQw4w9WgXcQ"
        title="World Cup Highlights"
        allowfullscreen>
    </iframe>
</section>

<script src="script.js"></script>

</body>
</html>
